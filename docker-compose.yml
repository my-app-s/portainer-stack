services:
  traefik:
    image: traefik:${VERSION_T:-latest}
    container_name: traefik
    restart: unless-stopped
    ports:
      - "${FORWARD_PORT_HTTP:-80}:80"       # Для перенаправления HTTP -> HTTPS
      - "${FORWARD_PORT_HTTPS:-443}:443"     # Внешний защищенный порт для входа в Portainer
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - traefik_certificates:/letsencrypt
    command:
      - "--log.level=INFO" # <--- ТЕПЕРЬ ОН БУДЕТ ПИСАТЬ ВСЁ
      - "--log.format=common" # Обычный текстовый формат логов
      - "--global.checknewversion=false"
      - "--global.sendanonymoususage=false"
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--providers.docker.network=traefik_public_network" # Strict connect network
      - "--entrypoints.web.address=:80" # Open port 80
      - "--entrypoints.websecure.address=:443" # Open port 443
      - "--entrypoints.web.http.redirections.entryPoint.to=websecure" # Redirections with 80 to 443
      - "--entrypoints.web.http.redirections.entryPoint.scheme=https"
      # Настройка резолвера (он просто готов к работе, но не включится без флага CERT_RESOLVER в labels)
      - "--certificatesresolvers.myresolver.acme.tlschallenge=true"
      - "--certificatesresolvers.myresolver.acme.email=${ACME_EMAIL:-admin@localhost.local}"
      - "--certificatesresolvers.myresolver.acme.storage=/letsencrypt/acme.json"
    networks:
      - local_network
      - public_network

  portainer:
    image: portainer/portainer-ce:${VERSION_P:-latest}
    container_name: portainer
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - portainer_data_volume:/data
    environment:
      - TZ=UTC
    labels:
      - "traefik.enable=true" # enable traefik
      # Base configure router
      - "traefik.http.routers.portainer.rule=Host(`${DOMAIN:-}`)" # Set access address host
      - "traefik.http.routers.portainer.entrypoints=websecure" # Set access port public
      - "traefik.http.services.portainer.loadbalancer.server.port=9000" # Set access port local app
      # Если указано CERT_RESOLVER=myresolver — включится Let's Encrypt.
      # Traefik генерирует self-signed сертификат для этого роутера.
      - "traefik.http.routers.portainer.tls=true" # enable TLS
      - "traefik.http.routers.portainer-https.tls.certresolver=${CERT_RESOLVER:-}"
    networks:
      - local_network

volumes:
  portainer_data_volume:
    name: portainer_data_volume
  traefik_certificates:
    name: traefik_certificates

networks:
  local_network:
    name: traefik_local_network
    internal: true
  public_network:
    name: traefik_public_network