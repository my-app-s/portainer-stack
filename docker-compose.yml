services:
  traefik:
    image: traefik:${VERSION_T:-latest}
    container_name: traefik
    restart: unless-stopped
    ports:
      - "${FORWARD_PORT_HTTP:-80}:80"
      - "${FORWARD_PORT_HTTPS:-443}:443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - traefik_certificates:/letsencrypt
    command:
      - "--log.level=INFO"
      - "--log.format=common"
      - "--global.checknewversion=false"
      - "--global.sendanonymoususage=false"
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--providers.docker.network=traefik_public_network"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.websecure.address=:443"
      - "--entrypoints.web.http.redirections.entryPoint.to=websecure"
      - "--entrypoints.web.http.redirections.entryPoint.scheme=https"
      - "--certificatesresolvers.myresolver.acme.tlschallenge=true"
      - "--certificatesresolvers.myresolver.acme.email=${ACME_EMAIL:-admin@localhost.local}"
      - "--certificatesresolvers.myresolver.acme.storage=/letsencrypt/acme.json"
    networks:
      - network_stack

  portainer:
    image: portainer/portainer-ce:${VERSION_P:-latest}
    container_name: portainer
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - portainer_data_volume:/data
    environment:
      - TZ=UTC
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.portainer.rule=Host(`${DOMAIN:-}`)"
      - "traefik.http.routers.portainer.entrypoints=websecure"
      - "--entrypoints.web.http.redirections.entryPoint.scheme=https"
      - "traefik.http.services.portainer.loadbalancer.server.port=9443"
      - "traefik.http.routers.portainer.tls=true"
      - "traefik.http.routers.portainer.tls.certresolver=${CERT_RESOLVER:-}"
    networks:
      - network_stack

volumes:
  portainer_data_volume:
    name: portainer_data_volume
  traefik_certificates:
    name: traefik_certificates

networks:
  network_stack:
    name: traefik_public_network